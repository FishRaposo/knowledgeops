services:
  web-app:
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  api-gateway:
    environment:
      LOG_LEVEL: info
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  auth-service:
    environment:
      LOG_LEVEL: info
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M

  ingestion-service:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  retrieval-service:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  llm-gateway:
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  eval-service:
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  trace-service:
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M

  db:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  redis:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
