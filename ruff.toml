# Ruff configuration file
target-version = "py310"
line-length = 88

extend-exclude = ["services/llm-gateway", "services/web-app", "shared/ts", ".venv"]

[lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "C",  # flake8-comprehensions
    "B",  # flake8-bugbear
]
ignore = []

[lint.per-file-ignores]
"tests/*" = ["E501", "E402", "C901"]

[lint.flake8-bugbear]
# FastAPI dependency-injection markers are idiomatic in argument defaults (B008).
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Body",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.Form",
    "fastapi.File",
    "fastapi.Security",
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
