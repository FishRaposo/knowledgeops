repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(services/(?!web-app|llm-gateway)|shared/python|tests)/
      - id: ruff-format
        files: ^(services/(?!web-app|llm-gateway)|shared/python|tests)/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional]
        files: ^(services/(?!web-app|llm-gateway)|shared/python)/
        additional_dependencies:
          - pydantic>=2.5.0
          - fastapi>=0.109.0

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(ts|tsx|js|jsx|json|yaml|yml|css|md)$
        exclude: ^services/(auth-service|ingestion-service|retrieval-service|eval-service|trace-service|api-gateway)/
