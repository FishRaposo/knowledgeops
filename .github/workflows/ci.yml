name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - api-gateway
          - ingestion-service
          - retrieval-service
          - eval-service
          - trace-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install shared-core + shared models + service
        run: |
          python -m pip install --upgrade pip
          pip install "shared-core[docparse,embeddings] @ git+https://github.com/FishRaposo/operator-shared-core.git"
          pip install -e ../../shared/python
          pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .

  python-test:
    runs-on: ubuntu-latest
    needs: python-lint
    strategy:
      matrix:
        service:
          - auth-service
          - api-gateway
          - ingestion-service
          - retrieval-service
          - eval-service
          - trace-service
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install shared-core + shared models + service
        run: |
          python -m pip install --upgrade pip
          pip install "shared-core[docparse,embeddings] @ git+https://github.com/FishRaposo/operator-shared-core.git"
          pip install -e ../../shared/python
          pip install -e ".[dev]" aiosqlite
      - run: pytest -q

  typescript-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - web-app
          - llm-gateway
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit

  integration-test:
    runs-on: ubuntu-latest
    needs: [python-test, typescript-build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pytest pytest-asyncio
      - run: docker compose up -d --wait
      - run: pytest tests/ -v --tb=short
      - run: docker compose down
