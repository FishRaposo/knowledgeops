events {
  worker_connections 1024;
}

http {
  upstream gateway {
    server gateway:8000;
  }

  upstream web_app {
    server web-app:3000;
  }

  server {
    listen 80;

    location /api/ {
      proxy_pass http://gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://web_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
